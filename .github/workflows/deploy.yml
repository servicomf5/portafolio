name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Deploy to VPS
        run: |
          scp -o StrictHostKeyChecking=no -r * ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/portafolio/
      
      - name: Build Docker
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd /opt/portafolio && docker-compose down 2>/dev/null || true"
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd /opt/portafolio && docker-compose up -d --build"
      
      - name: Wait for container
        run: sleep 45
      
      - name: Run migrations
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker exec portafolio-web python manage.py migrate --noinput 2>/dev/null || echo 'Migrations done'"
      
      - name: Collect static
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker exec portafolio-web python manage.py collectstatic --noinput 2>/dev/null || echo 'Static done'"
      
      - name: Verify
        run: |
          curl -f -o /dev/null -s -w "%{http_code}" http://${{ secrets.VPS_HOST }}:8012/ || echo "Site may be starting"
