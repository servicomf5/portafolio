name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Upload files to VPS
        run: |
          scp -o StrictHostKeyChecking=no -o BatchMode=yes -r * ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/portafolio/
          echo "Files uploaded successfully"
      
      - name: Notify
        run: |
          echo "=========================================="
          echo "¡Archivos subidos al VPS!"
          echo ""
          echo "Para completar el deploy, ejecuta en el VPS:"
          echo "  cd /opt/portafolio"
          echo "  docker-compose down"
          echo "  docker-compose up -d --build"
          echo "  docker exec portafolio-web python manage.py migrate --noinput"
          echo "  docker exec portafolio-web python manage.py collectstatic --noinput"
          echo ""
          echo "O ejecuta el script de deploy:"
          echo "  cd /opt/portafolio && bash deploy.sh"
          echo "=========================================="
