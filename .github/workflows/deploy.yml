name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Create .env file on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            mkdir -p /opt/portafolio
            cat > /opt/portafolio/.env << 'ENVEOF'
            DEBUG=False
            SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            ALLOWED_HOSTS=localhost,127.0.0.1,portafolio.servicomf5.cl
            DB_NAME=portafolio_db
            DB_USER=portafolio_user
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=localhost
            DB_PORT=5432
            EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
            ENVEOF
          "
      
      - name: Deploy to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='.env' \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env*' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/portafolio/
      
      - name: Build and restart Docker
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /opt/portafolio
            docker-compose down || true
            docker-compose up -d --build
            docker exec portafolio-web python manage.py migrate --noinput || echo 'No migrations needed'
            docker exec portafolio-web python manage.py collectstatic --noinput || echo 'No static files'
          "
      
      - name: Verify deployment
        run: |
          sleep 10
          curl -f -o /dev/null -s -w "%{http_code}" http://${{ secrets.VPS_HOST }}:8012/ || echo "Site may still be starting"
