name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      
      - name: Create .env file
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            mkdir -p /opt/portafolio
            echo 'DEBUG=False' > /opt/portafolio/.env
            echo 'DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}' >> /opt/portafolio/.env
            echo 'ALLOWED_HOSTS=localhost,127.0.0.1,portafolio.servicomf5.cl' >> /opt/portafolio/.env
            echo 'DB_NAME=portafolio_db' >> /opt/portafolio/.env
            echo 'DB_USER=portafolio_user' >> /opt/portafolio/.env
            echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> /opt/portafolio/.env
            echo 'DB_HOST=postgres' >> /opt/portafolio/.env
            echo 'DB_PORT=5432' >> /opt/portafolio/.env
            echo 'EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend' >> /opt/portafolio/.env
            echo 'EMAIL_HOST=mail.servicomf5.cl' >> /opt/portafolio/.env
            echo 'EMAIL_PORT=587' >> /opt/portafolio/.env
            echo 'EMAIL_USE_TLS=True' >> /opt/portafolio/.env
            echo 'EMAIL_HOST_USER=no-reply@servicomf5.cl' >> /opt/portafolio/.env
            echo 'EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_PASSWORD }}' >> /opt/portafolio/.env
            echo 'DEFAULT_FROM_EMAIL=no-reply@servicomf5.cl' >> /opt/portafolio/.env
            echo 'CONTACT_EMAIL=eduardomunoz.trabajo@gmail.com' >> /opt/portafolio/.env
          "
      
      - name: Upload files to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='.env' \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/portafolio/
      
      - name: Stop existing containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd /opt/portafolio && docker-compose down 2>/dev/null || true"
      
      - name: Build and start Docker
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd /opt/portafolio && docker-compose up -d"
      
      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL and Django to be ready..."
          sleep 60
      
      - name: Create static directory
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker exec portafolio-web mkdir -p /app/staticfiles"
      
      - name: Run migrations
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker exec portafolio-web python manage.py migrate --noinput || echo 'Migrations may have already been applied'"
      
      - name: Collect static
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker exec portafolio-web python manage.py collectstatic --noinput || echo 'Static files collected'"
      
      - name: Verify deployment
        run: |
          echo "Checking if site is responding..."
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }}:8012/ || echo "000")
          echo "HTTP Response Code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "Site is up!"
          else
            echo "Site may still be starting, check manually"
          fi
