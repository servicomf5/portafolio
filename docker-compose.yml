version: '3.8'

services:
  web:
    build: .
    container_name: portafolio-web
    env_file:
      - .env
    ports:
      - "8012:8000"
    environment:
      - DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,portafolio.servicomf5.cl}
      - DB_NAME=${DB_NAME:-portafolio_db}
      - DB_USER=${DB_USER:-portafolio_user}
      - DB_PASSWORD=${DB_PASSWORD:-portafolio_password}
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - portafolio_default
      - servicomf5-network

  postgres:
    image: postgres:17-alpine
    container_name: portafolio-postgres
    environment:
      - POSTGRES_DB=${DB_NAME:-portafolio_db}
      - POSTGRES_USER=${DB_USER:-portafolio_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-portafolio_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portafolio_user} -d ${DB_NAME:-portafolio_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  portafolio_default:
    external: true
  servicomf5-network:
    external: true
