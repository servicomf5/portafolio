<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Eduardo Muñoz - Portfolio{% endblock %}</title>
    <meta name="description" content="Portfolio profesional de Eduardo Andrés Muñoz Muñoz - Analista de Datos y Desarrollador Full Stack Python">
    
    {% load static %}
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,400i,500,500i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,400i,600,600i,700" rel="stylesheet">
    
    <!-- Template CSS Files -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/preloader.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/circle.css' %}" rel="stylesheet">
    <link href="{% static 'css/font-awesome.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/fm.revealator.jquery.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    
    <!-- CSS Skin File -->
    <link href="{% static 'css/skins/yellow.css' %}" rel="stylesheet">
    
    <!-- Modernizr JS File -->
    <script src="{% static 'js/modernizr.custom.js' %}"></script>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}home{% endblock %}">
    
    <!-- Header Starts -->
    <header class="header" id="navbar-collapse-toggle">
        <!-- Fixed Navigation Starts -->
        <ul class="icon-menu d-none d-lg-block revealator-slideup revealator-once revealator-delay1">
            <li class="icon-box {% if request.path == '/' %}active{% endif %}">
                <i class="fa fa-home"></i>
                <a href="{% url 'home' %}">
                    <h2>Inicio</h2>
                </a>
            </li>
            <li class="icon-box {% if '/about' in request.path %}active{% endif %}">
                <i class="fa fa-user"></i>
                <a href="{% url 'about' %}">
                    <h2>Sobre Mí</h2>
                </a>
            </li>
            <li class="icon-box {% if '/portfolio' in request.path %}active{% endif %}">
                <i class="fa fa-briefcase"></i>
                <a href="{% url 'portfolio' %}">
                    <h2>Portfolio</h2>
                </a>
            </li>
            <li class="icon-box {% if '/contact' in request.path %}active{% endif %}">
                <i class="fa fa-envelope-open"></i>
                <a href="{% url 'contact' %}">
                    <h2>Contacto</h2>
                </a>
            </li>
        </ul>
        <!-- Fixed Navigation Ends -->
        <!-- Mobile Menu Starts -->
        <nav role="navigation" class="d-block d-lg-none">
            <div id="menuToggle">
                <input type="checkbox" />
                <span></span>
                <span></span>
                <span></span>
                <ul class="list-unstyled" id="menu">
                    <li class="{% if request.path == '/' %}active{% endif %}">
                        <a href="{% url 'home' %}"><i class="fa fa-home"></i><span>Inicio</span></a>
                    </li>
                    <li class="{% if '/about' in request.path %}active{% endif %}">
                        <a href="{% url 'about' %}"><i class="fa fa-user"></i><span>Sobre Mí</span></a>
                    </li>
                    <li class="{% if '/portfolio' in request.path %}active{% endif %}">
                        <a href="{% url 'portfolio' %}"><i class="fa fa-folder-open"></i><span>Portfolio</span></a>
                    </li>
                    <li class="{% if '/contact' in request.path %}active{% endif %}">
                        <a href="{% url 'contact' %}"><i class="fa fa-envelope-open"></i><span>Contacto</span></a>
                    </li>
                </ul>
            </div>
        </nav>
        <!-- Mobile Menu Ends -->
    </header>
    <!-- Header Ends -->
    
    <!-- Main Content Starts -->
    <main>
        {% block content %}{% endblock %}
    </main>
    <!-- Main Content Ends -->
    
    <!-- Template JS Files -->
    <script src="{% static 'js/jquery-3.5.0.min.js' %}"></script>
    <script src="{% static 'js/preloader.min.js' %}"></script>
    <script src="{% static 'js/fm.revealator.jquery.min.js' %}"></script>
    <script src="{% static 'js/imagesloaded.pkgd.min.js' %}"></script>
    <script src="{% static 'js/masonry.pkgd.min.js' %}"></script>
    <script src="{% static 'js/classie.js' %}"></script>
    <script src="{% static 'js/cbpGridGallery.js' %}"></script>
    <script src="{% static 'js/jquery.hoverdir.js' %}"></script>
    <script src="{% static 'js/popper.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.js' %}"></script>
    <script src="{% static 'js/custom.js' %}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
